name: Build & Publish Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Pre-release verification ─────────────────────────────────────────────
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run all workspace tests
        run: cargo test --workspace
      - name: Clippy (release mode)
        run: cargo clippy --workspace --release -- -Dwarnings

  # ── Android (arm64-v8a, armeabi-v7a, x86_64) ─────────────────────────────
  android:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build Android libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./scripts/build-android.sh

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: prebuilt/android/

  # ── Linux x86_64 ──────────────────────────────────────────────────────────
  linux:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Linux libraries
        run: ./scripts/build-linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: prebuilt/linux-x86_64/

  # ── macOS (universal arm64 + x86_64) ──────────────────────────────────────
  macos:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Build macOS libraries
        run: ./scripts/build-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: prebuilt/macos/

  # ── iOS (device + simulator xcframework) ──────────────────────────────────
  ios:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios

      - name: Build iOS frameworks
        run: ./scripts/build-ios.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: prebuilt/ios/

  # ── Windows x86_64 (cross-compiled from Linux) ───────────────────────────
  windows:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build Windows libraries
        run: ./scripts/build-windows.sh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: prebuilt/windows-x86_64/

  # ── WASM (Cloudflare Workers / Browser) ────────────────────────────────
  wasm:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: ./scripts/build-wasm.sh

      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: prebuilt/wasm/

  # ── Native miner binaries ──────────────────────────────────────────────
  miner:
    name: "Build miner (${{ matrix.name }})"
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: salvium-miner-linux-x86_64
            cross: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: salvium-miner-linux-aarch64
            cross: true

          - target: x86_64-apple-darwin
            os: macos-13
            name: salvium-miner-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            name: salvium-miner-macos-aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: salvium-miner-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install cmake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install cmake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake --installargs '"ADD_CMAKE_TO_PATH=System"' -y

      - name: Build with cross (Linux)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p salvium-miner

      - name: Build native (macOS/Windows)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
          fi
          cargo build --release --target ${{ matrix.target }} -p salvium-miner

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/salvium-miner \
             ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\salvium-miner.exe ^
               ${{ matrix.name }}
        shell: cmd

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  # ── Publish to salvium-rs-releases ────────────────────────────────────────
  publish:
    needs: [android, linux, macos, ios, windows, wasm, miner]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package platform archives
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p release

          # Android
          cd artifacts/android
          tar czf "../../release/salvium-libs-android-${TAG}.tar.gz" .
          cd ../..

          # Linux
          cd artifacts/linux-x86_64
          tar czf "../../release/salvium-libs-linux-x86_64-${TAG}.tar.gz" .
          cd ../..

          # macOS
          cd artifacts/macos
          tar czf "../../release/salvium-libs-macos-universal-${TAG}.tar.gz" .
          cd ../..

          # iOS
          cd artifacts/ios
          tar czf "../../release/salvium-libs-ios-${TAG}.tar.gz" .
          cd ../..

          # Windows
          cd artifacts/windows-x86_64
          zip -r "../../release/salvium-libs-windows-x86_64-${TAG}.zip" .
          cd ../..

          # WASM
          cd artifacts/wasm
          tar czf "../../release/salvium-libs-wasm-${TAG}.tar.gz" .
          cd ../..

          # Miner binaries
          for dir in artifacts/salvium-miner-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name" 2>/dev/null || true
          done

          # Generate checksums
          cd release
          sha256sum * > checksums.sha256
          cat checksums.sha256
          cd ..

          ls -lh release/

      - name: Push to salvium-rs-releases
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="salvium-project/salvium-rs-releases"

          # Create release via GitHub API (draft for review before publishing)
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"body\":\"Pre-built Salvium Rust libraries and miner binaries for all platforms.\n\nBuilt from salvium-rs ${TAG}.\",\"draft\":true}" \
            | jq -r '.id')

          echo "Release ID: $RELEASE_ID"

          # Upload each archive as a release asset
          for file in release/*; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            curl -s -X POST \
              -H "Authorization: token $RELEASE_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${filename}" \
              --data-binary "@$file"
          done

          echo "==> Published draft to https://github.com/${REPO}/releases/tag/${TAG}"
